name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: services/api
        run: npm ci

      - name: Build TypeScript
        working-directory: services/api
        run: npm run build

      - name: Prune dev dependencies
        working-directory: services/api
        run: npm prune --omit=dev

      - name: Create deployment package
        working-directory: services/api
        run: zip -r deploy.zip package.json dist/ node_modules/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy pre-built zip to Azure
        run: |
          az webapp deploy \
            --name alerte-neige-api \
            --resource-group alerte-neige-rg \
            --src-path services/api/deploy.zip \
            --type zip \
            --timeout 300

      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            if curl -sf https://api.alertneige.app/api/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
