name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package.json

      - name: Install all deps & build
        working-directory: services/api
        run: |
          npm ci
          npm run build

      - name: Install production deps only
        working-directory: services/api
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Create deployment zip
        working-directory: services/api
        run: zip -r deploy.zip package.json dist/ node_modules/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name alerte-neige-api \
            --resource-group alerte-neige-rg \
            --src-path services/api/deploy.zip \
            --type zip \
            --async true

      - name: Health check
        run: |
          sleep 20
          curl -sf https://api.alertneige.app/api/health || echo "Health check pending — app may still be starting"
