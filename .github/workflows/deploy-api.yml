name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    # Use Debian Bookworm container to match Azure App Service's glibc
    container: node:22-bookworm
    steps:
      - uses: actions/checkout@v4

      # Install at repo root (npm workspaces)
      - name: Install all workspace dependencies
        run: npm ci

      # Build the API workspace
      - name: Build API
        run: npm run build --workspace=services/api

      # Create a standalone deploy package outside workspace context
      - name: Create deployment package
        run: |
          apt-get update && apt-get install -y zip
          mkdir -p /tmp/deploy
          cp services/api/package.json /tmp/deploy/
          cp -r services/api/dist /tmp/deploy/dist
          cd /tmp/deploy
          npm install --omit=dev
          echo "=== Checking better-sqlite3 native addon ==="
          ls -la node_modules/better-sqlite3/build/Release/
          node -e "const db = require('better-sqlite3')(':memory:'); console.log('better-sqlite3 OK'); db.close()"
          zip -r $GITHUB_WORKSPACE/deploy.zip package.json dist/ node_modules/
          echo "=== Zip size ==="
          ls -lh $GITHUB_WORKSPACE/deploy.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy pre-built zip to Azure
        run: |
          az webapp deploy \
            --name alerte-neige-api \
            --resource-group alerte-neige-rg \
            --src-path deploy.zip \
            --type zip \
            --timeout 300

      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            if curl -sf https://api.alertneige.app/api/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
