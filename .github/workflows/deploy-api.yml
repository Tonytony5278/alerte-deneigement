name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # Use Debian Bookworm to match Azure App Service's glibc
    container: node:22-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install workspace dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=services/api

      - name: Create deployment package
        run: |
          apt-get update -qq && apt-get install -y -qq zip > /dev/null
          mkdir -p /tmp/deploy
          cp services/api/package.json /tmp/deploy/
          cp -r services/api/dist /tmp/deploy/dist
          cd /tmp/deploy
          npm install --omit=dev
          node -e "const db = require('better-sqlite3')(':memory:'); console.log('better-sqlite3 OK'); db.close()"
          zip -r $GITHUB_WORKSPACE/deploy.zip package.json dist/ node_modules/

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-zip
          path: deploy.zip
          retention-days: 1

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name alerte-neige-api \
            --resource-group alerte-neige-rg \
            --src-path deploy.zip \
            --type zip \
            --timeout 300

      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            if curl -sf https://api.alertneige.app/api/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
