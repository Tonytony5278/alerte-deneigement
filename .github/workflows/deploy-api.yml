name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment zip (source for Oryx build)
        working-directory: services/api
        run: zip -r deploy.zip package.json tsconfig.json src/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name alerte-neige-api \
            --resource-group alerte-neige-rg \
            --src-path services/api/deploy.zip \
            --type zip \
            --async true \
            --timeout 900

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api.alertneige.app/api/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
