name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: https://api.alerteneige.app
        run: npm run build --workspace=apps/web

      - name: Create deployment package
        run: |
          mkdir -p /tmp/deploy
          # Copy entire standalone output (preserves monorepo structure with node_modules + server bundles)
          cp -r apps/web/.next/standalone/* /tmp/deploy/
          # Copy static assets (not included in standalone output)
          cp -r apps/web/.next/static /tmp/deploy/apps/web/.next/static
          cp -r apps/web/public /tmp/deploy/apps/web/public 2>/dev/null || true
          # Debug: show key files exist
          echo "=== Key files ==="
          ls -la /tmp/deploy/server.js /tmp/deploy/node_modules 2>/dev/null || true
          ls -la /tmp/deploy/apps/web/.next/server 2>/dev/null || echo "WARN: no apps/web/.next/server"
          ls -la /tmp/deploy/apps/web/node_modules 2>/dev/null || echo "WARN: no apps/web/node_modules"
          find /tmp/deploy -maxdepth 4 -name "*.js" | head -20
          cd /tmp/deploy
          zip -r $GITHUB_WORKSPACE/deploy.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-deploy-zip
          path: deploy.zip
          retention-days: 1

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-deploy-zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name alerte-neige-web \
            --resource-group alerte-neige-rg \
            --src-path deploy.zip \
            --type zip \
            --timeout 300

      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            if curl -sf https://alerteneige.app > /dev/null; then
              echo "Web app is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
