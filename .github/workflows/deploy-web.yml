name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: https://api.alerteneige.app
        run: npm run build --workspace=apps/web

      - name: Create deployment package
        run: |
          echo "=== Standalone directory structure ==="
          find apps/web/.next/standalone -maxdepth 4 -type d | head -40
          echo "=== Top-level files ==="
          find apps/web/.next/standalone -maxdepth 1 -type f
          echo "=== Nested app files ==="
          find apps/web/.next/standalone -maxdepth 5 -name "*.js" | head -20

          mkdir -p /tmp/deploy
          # Copy entire standalone output
          cp -r apps/web/.next/standalone/* /tmp/deploy/
          # Copy static assets into correct location
          # Find where .next dir lives in standalone output
          NEXT_DIR=$(find /tmp/deploy -type d -name ".next" | head -1)
          if [ -n "$NEXT_DIR" ]; then
            echo "Found .next at: $NEXT_DIR"
            cp -r apps/web/.next/static "$NEXT_DIR/static"
          else
            echo "No .next found, creating at root"
            mkdir -p /tmp/deploy/.next
            cp -r apps/web/.next/static /tmp/deploy/.next/static
          fi
          cp -r apps/web/public /tmp/deploy/public 2>/dev/null || true
          cd /tmp/deploy
          zip -r $GITHUB_WORKSPACE/deploy.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-deploy-zip
          path: deploy.zip
          retention-days: 1

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-deploy-zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name alerte-neige-web \
            --resource-group alerte-neige-rg \
            --src-path deploy.zip \
            --type zip \
            --timeout 300

      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            if curl -sf https://alerteneige.app > /dev/null; then
              echo "Web app is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
